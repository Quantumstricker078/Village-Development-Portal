{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-cog me-2"></i>Account Settings</h4>
            </div>
            <div class="card-body">
                <p class="mb-4">Select your preferred theme and save it to apply across your account.</p>

                <form method="POST" action="{{ url_for('settings') }}">
                    <div class="mb-3">
                        <label class="form-label">Theme Preference</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themeLight"
                                value="light" {% if user.theme_preference !='dark' %}checked{% endif %}>
                            <label class="form-check-label" for="themeLight">
                                Light Mode
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themeDark"
                                value="dark" {% if user.theme_preference=='dark' %}checked{% endif %}>
                            <label class="form-check-label" for="themeDark">
                                Dark Mode
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Save Preference
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
