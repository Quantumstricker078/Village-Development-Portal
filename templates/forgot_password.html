{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
            <div class="card-header bg-warning text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-unlock-alt me-2"></i>Reset Your Password</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">Enter the email address associated with your account and choose a new
                    password.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required
                            placeholder="Enter your registered email">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-key me-2"></i>New Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required
                            placeholder="Enter new password">
                        <small class="text-muted">Choose at least 6 characters.</small>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">
                            <i class="fas fa-key me-2"></i>Confirm Password
                        </label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                            required placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 py-2">
                        <i class="fas fa-save me-2"></i>Reset Password
                    </button>
                </form>

                <hr class="my-4">
                <div class="text-center">
                    <p class="text-muted mb-1">Remembered your password?</p>
                    <a href="{{ url_for('login') }}" class="text-decoration-none">
                        <i class="fas fa-sign-in-alt me-1"></i>Back to login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
