{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0">
                    <i class="fas fa-{{ 'plus' if not notice else 'edit' }} me-2"></i>
                    {{ 'Add New Notice' if not notice else 'Edit Notice' }}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="title" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="title" name="title"
                                value="{{ notice.title if notice else '' }}" required>
                        </div>
                        <div class="col-12">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description"
                                rows="4">{{ notice.description if notice else '' }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="valid_until" class="form-label">Valid Until</label>
                            <input type="date" class="form-control" id="valid_until" name="valid_until"
                                value="{{ notice.valid_until if notice else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label for="scheme_id" class="form-label">Related Scheme (Optional)</label>
                            <select class="form-select" id="scheme_id" name="scheme_id">
                                <option value="">No related scheme</option>
                                {% for scheme in schemes %}
                                <option value="{{ scheme.id }}" {% if notice and notice.scheme_id==scheme.id
                                    %}selected{% endif %}>{{ scheme.title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 text-end">
                            <a href="{{ url_for('admin_notices') }}" class="btn btn-outline-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>{{ 'Add Notice' if not notice else 'Update Notice' }}
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
