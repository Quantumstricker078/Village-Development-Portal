{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="fas fa-{{ 'plus' if not scheme else 'edit' }} me-2"></i>
                    {{ 'Add New Scheme' if not scheme else 'Edit Scheme' }}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="title" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="title" name="title"
                                value="{{ scheme.title if scheme else '' }}" required>
                        </div>
                        <div class="col-12">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description"
                                rows="3">{{ scheme.description if scheme else '' }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="department" class="form-label">Department *</label>
                            <input type="text" class="form-control" id="department" name="department"
                                value="{{ scheme.department if scheme else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="eligibility" class="form-label">Eligibility</label>
                            <input type="text" class="form-control" id="eligibility" name="eligibility"
                                value="{{ scheme.eligibility if scheme else '' }}">
                        </div>
                        <div class="col-12">
                            <label for="benefits" class="form-label">Benefits</label>
                            <textarea class="form-control" id="benefits" name="benefits"
                                rows="2">{{ scheme.benefits if scheme else '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label for="apply_link" class="form-label">Application Link</label>
                            <input type="url" class="form-control" id="apply_link" name="apply_link"
                                value="{{ scheme.apply_link if scheme else '' }}">
                        </div>
                        <div class="col-12 text-end">
                            <a href="{{ url_for('admin_schemes') }}" class="btn btn-outline-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>{{ 'Add Scheme' if not scheme else 'Update Scheme' }}
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
